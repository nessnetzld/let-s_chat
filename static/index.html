<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let's Chat!</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Main shell that contains login, presence list, and chat panels. -->
    <main class="app">
      <header class="header">
        <h1 class="title">Let's Chat!</h1>
        <div id="status" class="status">Disconnected</div>
      </header>

      <!-- Login section initializes the in-browser chat session. -->
      <section class="login">
        <input
          id="username"
          type="text"
          placeholder="Your username"
          maxlength="24"
        />
        <button id="loginBtn" type="button">Login</button>
      </section>

      <!-- Two-column layout: active users on the left, conversation on the right. -->
      <section class="content">
        <aside class="sidebar">
          <h2>Online users</h2>
          <ul id="users" class="users"></ul>
        </aside>

        <section class="chat">
          <!-- Message of the day is fetched dynamically from the backend API. -->
          <div id="motd" class="motd">Loading message of the day...</div>
          <div id="messages" class="messages"></div>

          <!-- Composer supports direct messages or public channel messages. -->
          <div class="composer">
            <div class="row">
              <input
                id="to"
                type="text"
                placeholder="Recipient username (or all)"
                value="all"
              />
              <input id="text" type="text" placeholder="Write a message..." />
            </div>
            <button id="sendBtn" type="button">Send</button>
            <p class="hint">
              Tip: use recipient all for a simple public channel.
            </p>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
